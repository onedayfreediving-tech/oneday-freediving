<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEDAY OCEAN LIFE 預約行事曆</title>
    <style>
        :root {
            --bg-color: #0b1528;
            --card-bg: #13223f;
            --text-color: #f1f5f9;
            --primary-color: #38bdf8;
            --border-color: #233554;
            --disabled-color: #1e293b;
            --success-color: #10b981;
            --link-color: #38bdf8;
            --info-bg: #1e293b;
            
            /* 各地點與特殊行程的顏色設定 */
            --taichung-bg: #10b981;  /* 台中：翠綠色 */
            --hengchun-bg: #ef4444;  /* 恆春：珊瑚紅 */
            --liuqiu-bg: #0284c7;    /* 小琉球：海洋藍 */
            --trip-bg: #a855f7;      /* 潛水旅遊：極光紫 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 5px;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 返回官網按鈕樣式 */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-home-btn:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        /* 課程時間對照表面板 */
        .info-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px 20px;
            width: 100%;
            max-width: 950px;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .info-header-row {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 12px;
        }

        .info-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .scroll-hint {
            display: none;
            position: absolute;
            right: 0;
            font-size: 11px;
            color: #64748b;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 20px;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; color: var(--primary-color); }
            100% { opacity: 0.5; }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            text-align: center;
        }

        .info-item {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(35, 53, 84, 0.5);
            border-radius: 8px;
            padding: 10px 5px;
            min-width: 100px;
        }

        .info-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 15px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 日曆主容器 */
        .calendar-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 950px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-cell {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            min-height: 110px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .day-cell.today {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
        }

        .day-cell.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            font-size: 14px;
            color: #94a3b8;
        }

        .day-cell.today .day-number {
            color: var(--primary-color);
        }

        .slots-container {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .slot-badge {
            background-color: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: var(--text-color);
            border-radius: 4px;
            padding: 4px;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .slot-badge:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
        }

        /* 🏷️ 地點與行程膠囊樣式 */
        .loc-tag {
            display: inline-block;
            font-size: 9px;
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 3px;
            color: #ffffff;
            margin-right: 4px;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        
        .loc-tag.taichung { background-color: var(--taichung-bg); }
        .loc-tag.hengchun { background-color: var(--hengchun-bg); }
        .loc-tag.liuqiu { background-color: var(--liuqiu-bg); }
        .loc-tag.special-trip { background-color: var(--trip-bg); box-shadow: 0 0 4px rgba(168, 85, 247, 0.5); }

        .slot-badge.full {
            background-color: var(--disabled-color);
            border-color: transparent;
            color: #64748b;
            cursor: not-allowed;
            pointer-events: none;
        }

        .slot-badge.empty-clickable {
            background-color: rgba(56, 189, 248, 0.03);
            border: 1px dashed rgba(56, 189, 248, 0.3);
            color: var(--link-color);
            text-align: center;
            justify-content: center;
            align-items: center;
            font-weight: 500;
        }

        .slot-badge.empty-clickable:hover {
            background-color: var(--link-color);
            color: var(--bg-color);
            border-color: var(--link-color);
        }

        .slot-meta {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 10px;
            opacity: 0.9;
        }

        .slot-title {
            font-weight: bold;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        .loading-text {
            text-align: center;
            color: var(--primary-color);
            padding: 20px;
            font-size: 16px;
        }

        .footer-note {
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            margin-top: 5px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 📱 手機與平板優化 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .scroll-hint { display: inline-block; }
            .info-panel { padding: 12px 15px; }
            .info-grid {
                display: flex; overflow-x: auto; gap: 10px; padding-bottom: 8px;
                -webkit-overflow-scrolling: touch; justify-content: flex-start;
            }
            .info-grid::-webkit-scrollbar { height: 4px; }
            .info-grid::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }
            .calendar-container { padding: 8px; }
            .days-grid { gap: 4px; }
            .day-cell { min-height: 95px; padding: 4px 2px; border-radius: 6px; }
            .day-number { font-size: 11px; margin-bottom: 4px; padding-left: 2px; }
            .slots-container { gap: 3px; }
            .slot-badge { font-size: 10px; padding: 2px 3px; border-radius: 4px; flex-direction: column; align-items: stretch; gap: 1px; }
            .slot-badge.empty-clickable { padding: 6px 0; font-size: 10px; }
            .slot-title { font-size: 10px; line-height: 1.1; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; justify-content: center; }
            .loc-tag { font-size: 8px; padding: 0px 3px; margin-right: 2px; }
            .slot-meta { font-size: 8px; line-height: 1; display: flex; justify-content: space-between; width: 100%; opacity: 0.8; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 1px; margin-top: 1px; }
        }
    </style>
</head>
<body>

    <h1>潛水預約行事曆</h1>
    <div class="subtitle">即時查看排班與剩餘名額，點擊即可直接導向 LINE 官方帳號進行預約</div>
    
    <a href="https://www.onedayfreediving.com" class="back-home-btn">← 返回官網</a>

    <div class="info-panel">
        <div class="info-header-row">
            <div class="info-title">⏱️ 課程與行程時間說明</div>
            <div class="scroll-hint">往右滑看更多 ➔</div>
        </div>
        <div class="info-grid">
            <div class="info-item"><div class="info-label">初階課程</div><div class="info-value">3 天</div></div>
            <div class="info-item"><div class="info-label">進階/高階</div><div class="info-value">4 天</div></div>
            <div class="info-item"><div class="info-label">海豚體驗班</div><div class="info-value">半 天</div></div>
            <div class="info-item"><div class="info-label">導潛</div><div class="info-value">2 小時</div></div>
            <div class="info-item"><div class="info-label">訓練</div><div class="info-value">2 小時</div></div>
            <div class="info-item"><div class="info-label">團練</div><div class="info-value">2 小時</div></div>
        </div>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
            <div class="month-title" id="monthTitle">2026年 7月</div>
            <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
        </div>
        <div class="weekdays">
            <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
        </div>
        <div id="loading" class="loading-text">正在載入教練行程與預約名額...</div>
        <div class="days-grid" id="daysGrid" style="display: none;"></div>
    </div>

    <div class="footer-note">* 若需要客製化時段，證照班分段上課請訊息官方帳號 *</div>

    <script>
        const SPREADSHEET_ID = '1airsLt1cE5XAoneMjfdQCGsOPcjxZ_ZZ-1rDU3EWtbg';
        const BOOKING_LINE_URL = 'https://lin.ee/BbKIko1';

        let currentDate = new Date(2026, 6, 1); 
        let sheetData = [];

        async function fetchGoogleSheet() {
            const sheetMonthName = `${currentDate.getMonth() + 1}月`;
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetMonthName)}`;
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);
                
                const rows = data.table.rows;
                const headers = data.table.cols.map(col => col ? col.label || '' : '');
                
                let lastValidDate = null;

                // 尋找「地點」與「剩餘名額」的精準欄位索引
                const locIndex = headers.findIndex(h => h && (h.toLowerCase().includes('loc') || h.includes('地點')));
                let availableIndex = headers.findIndex(h => h && (h.includes('Available') || h.includes('剩餘')));
                if (availableIndex === -1) availableIndex = headers.length - 1;

                sheetData = rows.map(row => {
                    const cells = row.c;
                    if (!cells) return null;
                    
                    let dateStr = null;
                    if (cells[0]) {
                        dateStr = cells[0].f ? cells[0].f : parseGoogleDate(cells[0].v);
                    }
                    
                    if (dateStr) {
                        lastValidDate = dateStr;
                    } else if (cells[1] && (cells[1].f || cells[1].v !== null)) {
                        dateStr = lastValidDate;
                    }

                    let timeStr = '';
                    if (cells[1]) {
                        timeStr = cells[1].f ? cells[1].f : parseGoogleTime(cells[1].v);
                    }

                    if (!dateStr || !timeStr) return null;
                    
                    // 取得獨立地點欄位值
                    let specificLocation = '';
                    if (locIndex !== -1 && cells[locIndex] && cells[locIndex].v) {
                        specificLocation = String(cells[locIndex].v).trim();
                    }

                    // 掃描課程名稱項目（地點欄位右側第 2 欄起，即跳過地點與總名額，從 F 欄開始掃描）
                    let project = '';
                    const scanStartIndex = locIndex !== -1 ? locIndex + 2 : 5;

                    for (let i = scanStartIndex; i < availableIndex; i++) {
                        if (cells[i] && cells[i].v !== null && cells[i].v !== '') {
                            let cellText = cells[i].f ? cells[i].f : String(cells[i].v);
                            if (!isNaN(cellText) || cellText.trim().toLowerCase() === 'v') {
                                project = headers[i] || '潛水行程';
                            } else {
                                project = cellText;
                            }
                            break;
                        }
                    }

                    return {
                        date: dateStr,
                        time: timeStr,
                        period: cells[2] ? (cells[2].f || cells[2].v || '') : '',
                        capacity: cells[3] ? (cells[3].v || 0) : 0,
                        project: project,
                        location: specificLocation,
                        available: cells[availableIndex] ? (cells[availableIndex].v || 0) : 0
                    };
                }).filter(item => item && item.date && item.time !== '');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('daysGrid').style.display = 'grid';
                renderCalendar();
            } catch (error) {
                console.error("讀取試算表失敗:", error);
                document.getElementById('loading').innerText = `暫時無法載入 ${sheetMonthName} 的預約資料，請確認您的試算表中是否有建立名為「${sheetMonthName}」的分頁喔！`;
            }
        }

        // 地點與特殊行程專屬渲染
        function getProjectTitleHTML(projectName, rowLocation) {
            if (!projectName) return '潛水行程';
            
            const locationToUse = (rowLocation || projectName).trim();

            if (locationToUse.includes('旅遊') || locationToUse.includes('潛旅') || locationToUse.includes('出國')) {
                let cleanedName = projectName.replace('潛水旅遊', '').replace('潛旅', '').replace('旅遊', '').replace('出國', '').trim();
                return `<span class="loc-tag special-trip">✈️ 潛旅</span>${cleanedName || '行程'}`;
            }

            if (locationToUse.includes('台中')) {
                const cleanedName = projectName.replace('台中', '').trim();
                return `<span class="loc-tag taichung">台中</span>${cleanedName || '行程'}`;
            }
            
            if (locationToUse.includes('恆春')) {
                const cleanedName = projectName.replace('恆春', '').trim();
                return `<span class="loc-tag hengchun">恆春</span>${cleanedName || '行程'}`;
            }
            
            if (locationToUse.includes('小琉球') || locationToUse.includes('琉球')) {
                const cleanedName = projectName.replace('小琉球', '').replace('琉球', '').trim();
                return `<span class="loc-tag liuqiu">琉球</span>${cleanedName || '行程'}`;
            }
            
            return projectName;
        }

        function createDayCell(year, month, day, isOtherMonth, isToday = false) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (isOtherMonth) cell.classList.add('other-month');
            if (isToday) cell.classList.add('today');

            cell.innerHTML = `<div class="day-number">${String(day).padStart(2, '0')}</div>`;

            const slotsContainer = document.createElement('div');
            slotsContainer.className = 'slots-container';

            const matchedSlots = sheetData.filter(item => {
                const itemDateObj = new Date(item.date);
                return itemDateObj.getFullYear() === year && 
                       itemDateObj.getMonth() === month && 
                       itemDateObj.getDate() === day;
            });

            if (matchedSlots.length > 0) {
                matchedSlots.forEach(slot => {
                    const badge = document.createElement('a');
                    badge.className = 'slot-badge';
                    badge.href = BOOKING_LINE_URL;
                    badge.target = '_blank';
                    
                    const projectHTML = getProjectTitleHTML(slot.project, slot.location);
                    const isFull = slot.available <= 0;
                    const displayTime = slot.time.includes(':') ? slot.time : slot.time + '點';
                    
                    if (isFull) {
                        badge.classList.add('full');
                        badge.innerHTML = `<span class="slot-title">${projectHTML}</span><span class="slot-meta"><span>${slot.period} ${displayTime}</span><span>額滿</span></span>`;
                    } else {
                        badge.innerHTML = `<span class="slot-title">${projectHTML} (餘 ${slot.available})</span><span class="slot-meta"><span>${slot.period} ${displayTime}</span><span style="color:var(--primary-color)">預約</span></span>`;
                    }
                    slotsContainer.appendChild(badge);
                });
            } else if (!isOtherMonth) {
                const emptyBadge = document.createElement('a');
                emptyBadge.className = 'slot-badge empty-clickable';
                emptyBadge.href = BOOKING_LINE_URL;
                emptyBadge.target = '_blank';
                emptyBadge.innerText = '可預約';
                slotsContainer.appendChild(emptyBadge);
            }

            cell.appendChild(slotsContainer);
            return cell;
        }

        function parseGoogleDate(dateStr) {
            if (!dateStr) return null;
            if (typeof dateStr === 'string' && dateStr.startsWith('Date')) {
                const parts = dateStr.match(/\d+/g);
                if (parts) {
                    return `${parts[0]}/${String(parseInt(parts[1]) + 1).padStart(2, '0')}/${parts[2].padStart(2, '0')}`;
                }
            }
            return dateStr;
        }

        function parseGoogleTime(timeVal) {
            if (timeVal === null || timeVal === undefined) return '';
            const timeStr = String(timeVal);
            if (timeStr.startsWith('Date')) {
                const parts = timeStr.match(/\d+/g);
                if (parts && parts.length >= 4) {
                    return parts[3];
                }
            }
            return timeStr;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('monthTitle').innerText = `${year}年 ${month + 1}月`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const prevLastDay = new Date(year, month, 0).getDate();

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            for (let i = firstDayIndex; i > 0; i--) {
                grid.appendChild(createDayCell(year, month - 1, prevLastDay - i + 1, true));
            }

            const today = new Date();
            for (let i = 1; i <= lastDay; i++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
                grid.appendChild(createDayCell(year, month, i, false, isToday));
            }

            const totalCells = firstDayIndex + lastDay;
            const remaining = 42 - totalCells;
            for (let i = 1; i <= remaining; i++) {
                grid.appendChild(createDayCell(year, month + 1, i, true));
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "正在載入教練行程與預約名額...";
            document.getElementById('daysGrid').style.display = 'none';
            fetchGoogleSheet();
        }

        window.onload = fetchGoogleSheet;
    </script>
</body>
</html>
