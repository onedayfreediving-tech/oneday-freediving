<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEDAY OCEAN LIFE 預約行事曆</title>
    <style>
        :root {
            --bg-color: #0b1528;
            --card-bg: #13223f;
            --text-color: #f1f5f9;
            --primary-color: #d1b88a;
            --border-color: #233554;
            --disabled-color: #1e293b;
            --success-color: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 5px;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 25px;
            text-align: center;
        }

        .calendar-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            padding: 20px;
            box-sizing: border-box;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-cell {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            min-height: 100px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .day-cell.today {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(209, 184, 138, 0.2);
        }

        .day-cell.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            font-size: 14px;
            color: #94a3b8;
        }

        .day-cell.today .day-number {
            color: var(--primary-color);
        }

        .slots-container {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .slot-badge {
            background-color: rgba(209, 184, 138, 0.1);
            border: 1px solid rgba(209, 184, 138, 0.3);
            color: var(--text-color);
            border-radius: 4px;
            padding: 4px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .slot-badge:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
        }

        .slot-badge.full {
            background-color: var(--disabled-color);
            border-color: transparent;
            color: #64748b;
            cursor: not-allowed;
            pointer-events: none;
        }

        .loading-text {
            text-align: center;
            color: var(--primary-color);
            padding: 20px;
            font-size: 16px;
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }
            .day-cell {
                min-height: 75px;
                padding: 4px;
            }
            .day-number {
                font-size: 11px;
            }
            .slot-badge {
                font-size: 9px;
                padding: 2px;
            }
        }
    </style>
</head>
<body>

    <h1>潛水預約行事曆</h1>
    <div class="subtitle">即時查看剩餘名額，點擊「預約」立即報名 · 資料自動同步更新</div>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
            <div class="month-title" id="monthTitle">2026年 7月</div>
            <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
        </div>

        <div class="weekdays">
            <div>SUN</div>
            <div>MON</div>
            <div>TUE</div>
            <div>WED</div>
            <div>THU</div>
            <div>FRI</div>
            <div>SAT</div>
        </div>

        <div id="loading" class="loading-text">正在載入教練行程與預約名額...</div>
        <div class="days-grid" id="daysGrid" style="display: none;"></div>
    </div>

    <script>
        // 設定試算表對接參數
        const SPREADSHEET_ID = '1airsLt1cE5XAoneMjfdQCGsOPcjxZ_ZZ-1rDU3EWtbg';
        const SHEET_NAME = '7月';
        
        // 你的 Google 預約表單連結（點擊時段會跳轉到此連結）
        const BOOKING_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfD_K9M_Tid3U_9klyXzD6P8-wU7N6U8_8w9u_vI3HhY_zTqA/viewform'; // 若有指定表單網址可替換

        let currentDate = new Date(2026, 6, 1); // 預設為 2026年 7月
        let sheetData = [];

        // 使用 Google Visualization API (gvix) 防止 CORS 的非同步讀取
        async function fetchGoogleSheet() {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                // 移除 Google 返回的 JSONP 包裝字串
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);
                
                const rows = data.table.rows;
                sheetData = rows.map(row => {
                    const cells = row.c;
                    return {
                        date: cells[0] ? parseGoogleDate(cells[0].v) : '',
                        time: cells[1] ? cells[1].v : '',
                        period: cells[2] ? cells[2].v : '',
                        capacity: cells[3] ? cells[3].v : 0,
                        available: cells[11] ? cells[11].v : 0
                    };
                }).filter(item => item.date); // 過濾掉空行
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('daysGrid').style.display = 'grid';
                renderCalendar();
            } catch (error) {
                console.error("讀取試算表失敗:", error);
                document.getElementById('loading').innerText = "暫時無法載入預約資料，請檢查試算表共用設定（是否已開啟「知道連結的任何人」皆可檢視）。";
            }
        }

        function parseGoogleDate(dateStr) {
            if (typeof dateStr === 'string' && dateStr.startsWith('Date')) {
                // 格式為 Date(2026, 6, 14)
                const parts = dateStr.match(/\d+/g);
                if (parts) {
                    return `${parts[0]}/${String(parseInt(parts[1]) + 1).padStart(2, '0')}/${parts[2].padStart(2, '0')}`;
                }
            }
            return dateStr; // 如果是普通字串直接回傳
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('monthTitle').innerText = `${year}年 ${month + 1}月`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const prevLastDay = new Date(year, month, 0).getDate();

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            // 渲染上個月的尾巴
            for (let i = firstDayIndex; i > 0; i--) {
                const dayNum = prevLastDay - i + 1;
                grid.appendChild(createDayCell(year, month - 1, dayNum, true));
            }

            // 渲染本月的日期
            const today = new Date();
            for (let i = 1; i <= lastDay; i++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
                grid.appendChild(createDayCell(year, month, i, false, isToday));
            }

            // 補齊下個月的開頭
            const totalCells = firstDayIndex + lastDay;
            const remaining = 42 - totalCells;
            for (let i = 1; i <= remaining; i++) {
                grid.appendChild(createDayCell(year, month + 1, i, true));
            }
        }

        function createDayCell(year, month, day, isOtherMonth, isToday = false) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (isOtherMonth) cell.classList.add('other-month');
            if (isToday) cell.classList.add('today');

            const formattedDayNum = String(day).padStart(2, '0');
            cell.innerHTML = `<div class="day-number">${formattedDayNum}</div>`;

            const slotsContainer = document.createElement('div');
            slotsContainer.className = 'slots-container';

            // 篩選出符合此日期的試算表預約時段
            const targetDateStr = `${year}/${String(month + 1).padStart(2, '0')}/${String(day).padStart(2, '0')}`;
            const matchedSlots = sheetData.filter(item => {
                // 相容 2026/07/14 與 2026/7/14 兩種日期比對格式
                const itemDateObj = new Date(item.date);
                return itemDateObj.getFullYear() === year && 
                       itemDateObj.getMonth() === month && 
                       itemDateObj.getDate() === day;
            });

            matchedSlots.forEach(slot => {
                const badge = document.createElement('a');
                badge.className = 'slot-badge';
                
                const isFull = slot.available <= 0;
                if (isFull) {
                    badge.classList.add('full');
                    badge.innerHTML = `<span>${slot.period} ${slot.time}點</span><span>額滿</span>`;
                } else {
                    badge.href = BOOKING_FORM_URL;
                    badge.target = '_blank';
                    badge.innerHTML = `<span>${slot.period} ${slot.time}點</span><span>餘 ${slot.available}</span>`;
                }
                slotsContainer.appendChild(badge);
            });

            cell.appendChild(slotsContainer);
            return cell;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        // 頁面開啟時載入
        window.onload = fetchGoogleSheet;
    </script>
</body>
</html>
