<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEDAY OCEAN LIFE 預約行事曆</title>
    <style>
        :root {
            --bg-color: #0b1528;
            --card-bg: #13223f;
            --text-color: #f1f5f9;
            --primary-color: #38bdf8;
            --border-color: #233554;
            --disabled-color: #1e293b;
            --success-color: #10b981;
            --link-color: #38bdf8;
            --info-bg: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 5px;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* 返回官網按鈕樣式 */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-home-btn:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        /* 課程時間對照表面板 */
        .info-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px 20px;
            width: 100%;
            max-width: 950px;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .info-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: 1px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            text-align: center;
        }

        .info-item {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(35, 53, 84, 0.5);
            border-radius: 8px;
            padding: 10px 5px;
            min-width: 100px; /* 確保在手機滑動時不會被壓縮扁掉 */
        }

        .info-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 15px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 日曆主容器 */
        .calendar-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 950px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-cell {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            min-height: 110px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .day-cell.today {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
        }

        .day-cell.other-month {
            opacity: 0.3;
        }

        .day-number {
            font-weight: bold;
            font-size: 14px;
            color: #94a3b8;
        }

        .day-cell.today .day-number {
            color: var(--primary-color);
        }

        .slots-container {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .slot-badge {
            background-color: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: var(--text-color);
            border-radius: 4px;
            padding: 4px;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .slot-badge:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
        }

        .slot-badge.full {
            background-color: var(--disabled-color);
            border-color: transparent;
            color: #64748b;
            cursor: not-allowed;
            pointer-events: none;
        }

        .slot-badge.empty-clickable {
            background-color: rgba(56, 189, 248, 0.03);
            border: 1px dashed rgba(56, 189, 248, 0.3);
            color: var(--link-color);
            text-align: center;
            justify-content: center;
            align-items: center;
            font-weight: 500;
        }

        .slot-badge.empty-clickable:hover {
            background-color: var(--link-color);
            color: var(--bg-color);
            border-color: var(--link-color);
        }

        .slot-meta {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 10px;
            opacity: 0.9;
        }

        .slot-title {
            font-weight: bold;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .loading-text {
            text-align: center;
            color: var(--primary-color);
            padding: 20px;
            font-size: 16px;
        }

        /* 底部註記文字樣式 */
        .footer-note {
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            margin-top: 5px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 📱 針對手機與平板的排版優化 */
        @media (max-width: 768px) {
            body { 
                padding: 10px; 
            }

            /* 手機版：使課程時間改為橫向滑動，不被擠壓，保持跟網頁版一樣的高級感 */
            .info-panel {
                padding: 12px 15px;
            }
            .info-grid {
                display: flex;
                overflow-x: auto; /* 啟用橫向滾動 */
                gap: 10px;
                padding-bottom: 8px; /* 留出滾動條空間 */
                -webkit-overflow-scrolling: touch; /* 平滑滾動 */
                justify-content: flex-start;
            }
            /* 隱藏預設滾動條以求美觀（非必要，但較乾淨） */
            .info-grid::-webkit-scrollbar {
                height: 4px;
            }
            .info-grid::-webkit-scrollbar-thumb {
                background-color: var(--border-color);
                border-radius: 10px;
            }

            /* 日曆優化，避免格子過於擁擠 */
            .calendar-container {
                padding: 12px;
            }
            .days-grid {
                gap: 5px; /* 縮小格子間距，爭取最大顯示空間 */
            }
            .day-cell { 
                min-height: 90px; 
                padding: 4px; 
            }
            .day-number { 
                font-size: 11px; 
            }
            .slot-badge { 
                font-size: 9px; 
                padding: 3px 2px; 
            }
            .slot-meta { 
                font-size: 8px; 
            }
            .slot-title {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>

    <h1>潛水預約行事曆</h1>
    <div class="subtitle">即時查看排班與剩餘名額，點擊即可直接導向 LINE 官方帳號進行預約</div>
    
    <!-- 返回官網按鈕 -->
    <a href="https://www.onedayfreediving.com" class="back-home-btn">← 返回官網</a>

    <!-- 課程時間一覽表 -->
    <div class="info-panel">
        <div class="info-title">⏱️ 課程與行程時間說明</div>
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">初階課程</div>
                <div class="info-value">3 天</div>
            </div>
            <div class="info-item">
                <div class="info-label">進階/高階</div>
                <div class="info-value">4 天</div>
            </div>
            <div class="info-item">
                <div class="info-label">海豚體驗班</div>
                <div class="info-value">半 天</div>
            </div>
            <div class="info-item">
                <div class="info-label">導潛</div>
                <div class="info-value">2 小時</div>
            </div>
            <div class="info-item">
                <div class="info-label">訓練</div>
                <div class="info-value">2 小時</div>
            </div>
            <div class="info-item">
                <div class="info-label">團練</div>
                <div class="info-value">2 小時</div>
            </div>
        </div>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>
            <div class="month-title" id="monthTitle">2026年 7月</div>
            <button class="nav-btn" onclick="changeMonth(1)">&gt;</button>
        </div>

        <div class="weekdays">
            <div>SUN</div>
            <div>MON</div>
            <div>TUE</div>
            <div>WED</div>
            <div>THU</div>
            <div>FRI</div>
            <div>SAT</div>
        </div>

        <div id="loading" class="loading-text">正在載入教練行程與預約名額...</div>
        <div class="days-grid" id="daysGrid" style="display: none;"></div>
    </div>

    <!-- 底部註記文字 -->
    <div class="footer-note">
        * 若需要客製化時段，證照班分段上課請訊息官方帳號 *
    </div>

    <script>
        const SPREADSHEET_ID = '1airsLt1cE5XAoneMjfdQCGsOPcjxZ_ZZ-1rDU3EWtbg';
        const BOOKING_LINE_URL = 'https://lin.ee/BbKIko1';

        let currentDate = new Date(2026, 6, 1); 
        let sheetData = [];

        async function fetchGoogleSheet() {
            const sheetMonthName = `${currentDate.getMonth() + 1}月`;
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetMonthName)}`;
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);
                
                const rows = data.table.rows;
                const headers = data.table.cols.map(col => col.label || '');
                
                sheetData = rows.map(row => {
                    const cells = row.c;
                    if (!cells || !cells[0] || !cells[1]) return null;
                    
                    let project = '';
                    for (let i = 4; i <= 10; i++) {
                        if (cells[i] && cells[i].v !== null && cells[i].v !== '') {
                            project = headers[i] || '潛水行程';
                            break;
                        }
                    }

                    return {
                        date: parseGoogleDate(cells[0].v),
                        time: parseGoogleTime(cells[1].v),
                        period: cells[2] ? cells[2].v : '',
                        capacity: cells[3] ? cells[3].v : 0,
                        project: project,
                        available: cells[11] ? cells[11].v : 0
                    };
                }).filter(item => item && item.date && item.time !== '');
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('daysGrid').style.display = 'grid';
                renderCalendar();
            } catch (error) {
                console.error("讀取試算表失敗:", error);
                document.getElementById('loading').innerText = `暫時無法載入 ${sheetMonthName} 的預約資料，請確認您的試算表中是否有建立名為「${sheetMonthName}」的分頁喔！`;
            }
        }

        function parseGoogleDate(dateStr) {
            if (typeof dateStr === 'string' && dateStr.startsWith('Date')) {
                const parts = dateStr.match(/\d+/g);
                if (parts) {
                    return `${parts[0]}/${String(parseInt(parts[1]) + 1).padStart(2, '0')}/${parts[2].padStart(2, '0')}`;
                }
            }
            return dateStr;
        }

        function parseGoogleTime(timeVal) {
            if (timeVal === null || timeVal === undefined) return '';
            const timeStr = String(timeVal);
            if (timeStr.startsWith('Date')) {
                const parts = timeStr.match(/\d+/g);
                if (parts && parts.length >= 4) {
                    return parts[3];
                }
            }
            return timeStr;
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('monthTitle').innerText = `${year}年 ${month + 1}月`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const prevLastDay = new Date(year, month, 0).getDate();

            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            for (let i = firstDayIndex; i > 0; i--) {
                grid.appendChild(createDayCell(year, month - 1, prevLastDay - i + 1, true));
            }

            const today = new Date();
            for (let i = 1; i <= lastDay; i++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
                grid.appendChild(createDayCell(year, month, i, false, isToday));
            }

            const totalCells = firstDayIndex + lastDay;
            const remaining = 42 - totalCells;
            for (let i = 1; i <= remaining; i++) {
                grid.appendChild(createDayCell(year, month + 1, i, true));
            }
        }

        function createDayCell(year, month, day, isOtherMonth, isToday = false) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (isOtherMonth) cell.classList.add('other-month');
            if (isToday) cell.classList.add('today');

            cell.innerHTML = `<div class="day-number">${String(day).padStart(2, '0')}</div>`;

            const slotsContainer = document.createElement('div');
            slotsContainer.className = 'slots-container';

            const matchedSlots = sheetData.filter(item => {
                const itemDateObj = new Date(item.date);
                return itemDateObj.getFullYear() === year && 
                       itemDateObj.getMonth() === month && 
                       itemDateObj.getDate() === day;
            });

            if (matchedSlots.length > 0) {
                matchedSlots.forEach(slot => {
                    const badge = document.createElement('a');
                    badge.className = 'slot-badge';
                    badge.href = BOOKING_LINE_URL;
                    badge.target = '_blank';
                    
                    const isFull = slot.available <= 0;
                    if (isFull) {
                        badge.classList.add('full');
                        badge.innerHTML = `<div class="slot-title">${slot.project || '潛水行程'}</div><div class="slot-meta"><span>${slot.period}${slot.time}點</span><span>額滿</span></div>`;
                    } else {
                        badge.innerHTML = `<div class="slot-title">${slot.project || '潛水行程'} (餘 ${slot.available}人)</div><div class="slot-meta"><span>${slot.period}${slot.time}點</span><span style="color:var(--primary-color)">點擊預約</span></div>`;
                    }
                    slotsContainer.appendChild(badge);
                });
            } else if (!isOtherMonth) {
                const emptyBadge = document.createElement('a');
                emptyBadge.className = 'slot-badge empty-clickable';
                emptyBadge.href = BOOKING_LINE_URL;
                emptyBadge.target = '_blank';
                emptyBadge.innerText = '可預約';
                slotsContainer.appendChild(emptyBadge);
            }

            cell.appendChild(slotsContainer);
            return cell;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "正在載入教練行程與預約名額...";
            document.getElementById('daysGrid').style.display = 'none';
            
            fetchGoogleSheet();
        }

        window.onload = fetchGoogleSheet;
    </script>
</body>
</html>
