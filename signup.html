<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程報名表｜One Day 自由潛水工作室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1528;
    --bg-card:#101f38;
    --bg-field:#0c1930;
    --border:#1d3355;
    --accent:#2dd4bf;
    --accent-2:#38bdf8;
    --text:#eaf2ff;
    --text-dim:#8ea3c6;
    --danger:#ff6b6b;
    --ok:#34d399;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% -10%, #14294a 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Noto Sans TC', sans-serif;
    min-height:100vh;
    padding:24px 16px 64px;
  }
  .wrap{max-width:640px;margin:0 auto;}
  header{text-align:center;margin-bottom:24px;}
  .pixel{font-family:'Press Start 2P', 'Noto Sans TC', sans-serif;font-size:13px;color:var(--accent);letter-spacing:1px;}
  h1{font-size:22px;margin:10px 0 6px;color:var(--text);}
  .sub{color:var(--text-dim);font-size:14px;line-height:1.6;}
  .calendar-link{
    display:inline-block;margin-top:14px;padding:8px 18px;border:1px solid var(--accent);
    border-radius:999px;color:var(--accent);text-decoration:none;font-size:13px;
  }
  .calendar-link:hover{background:rgba(45,212,191,.1);}

  .card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px 20px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  .field{margin-bottom:18px;}
  label{display:block;font-size:14px;color:var(--text-dim);margin-bottom:6px;}
  label .req{color:var(--danger);margin-left:2px;}
  input[type=text], input[type=date], input[type=number], select{
    width:100%;
    background:var(--bg-field);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    color:var(--text);
    font-size:15px;
    font-family:inherit;
    appearance:none;
  }
  select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9'><path d='M0 0l7 8 7-8z' fill='%238ea3c6'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
    padding-right:36px;
  }
  input:focus, select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,212,191,.15);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media (max-width:520px){.row2{grid-template-columns:1fr;}}

  .medical{
    background:var(--bg-field);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    font-size:13px;
    line-height:1.8;
    color:var(--text-dim);
    max-height:180px;
    overflow-y:auto;
    margin-bottom:14px;
  }
  .medical b{color:var(--text);}
  .checkbox-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:22px;}
  .checkbox-row input{width:18px;height:18px;margin-top:2px;accent-color:var(--accent);flex:0 0 auto;}
  .checkbox-row span{font-size:14px;color:var(--text);}

  button.submit{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#04121f;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .2s;
  }
  button.submit:disabled{opacity:.6;cursor:not-allowed;}

  .msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:14px;display:none;}
  .msg.error{display:block;background:rgba(255,107,107,.12);border:1px solid var(--danger);color:#ffb4b4;}
  .msg.info{display:block;background:rgba(56,189,248,.12);border:1px solid var(--accent-2);color:#bfe9ff;}

  .overlay{
    position:fixed;inset:0;background:rgba(3,8,18,.75);
    display:none;align-items:center;justify-content:center;padding:16px;z-index:50;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
    max-width:420px;width:100%;padding:24px 20px;text-align:center;
  }
  .modal h2{margin:0 0 6px;font-size:18px;color:var(--ok);}
  .modal p.small{color:var(--text-dim);font-size:13px;margin-bottom:16px;}
  .pay-amount{
    font-size:15px;color:var(--text-dim);margin-bottom:4px;
  }
  .pay-amount b{display:block;font-size:28px;color:var(--accent);margin-top:2px;}
  .bank-box{
    background:var(--bg-field);border:1px solid var(--border);border-radius:12px;
    padding:14px;text-align:left;font-size:14px;line-height:2;margin-bottom:18px;
  }
  .bank-box b{color:var(--accent);}
  .modal-btn{
    display:block;width:100%;padding:13px;border-radius:10px;border:none;
    font-size:15px;font-weight:700;margin-bottom:10px;cursor:pointer;text-decoration:none;
  }
  .modal-btn.line{background:#06C755;color:#fff;}
  .modal-btn.close{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="pixel">ONE DAY FREEDIVE</div>
    <h1>課程報名表</h1>
    <p class="sub">填寫以下資料完成報名，送出後會提供付款帳號資訊，<br>並可一鍵傳送報名資訊到官方 LINE 帳號。</p>
    <a class="calendar-link" href="https://onedayfreediving-tech.github.io/oneday-freediving/" target="_blank" rel="noopener">查看預約行事曆／可預約時段 →</a>
  </header>

  <form class="card" id="signupForm" novalidate>

    <div class="field">
      <label>真實姓名<span class="req">*</span></label>
      <input type="text" id="name" required>
    </div>

    <div class="row2">
      <div class="field">
        <label>性別<span class="req">*</span></label>
        <select id="gender" required>
          <option value="" disabled selected>請選擇</option>
          <option value="女">女</option>
          <option value="男">男</option>
          <option value="不透露">不透露</option>
        </select>
      </div>
      <div class="field">
        <label>生日<span class="req">*</span></label>
        <input type="date" id="birthday" required>
      </div>
    </div>

    <div class="field">
      <label>課程項目<span class="req">*</span></label>
      <select id="course" required>
        <option value="" disabled selected>請選擇課程</option>
        <option value="AIDA1 海豚體驗課（半天）">AIDA1 海豚體驗課（半天）</option>
        <option value="AIDA2 證照（三天）">AIDA2 證照（三天）</option>
        <option value="AIDA3 證照（四天）">AIDA3 證照（四天）</option>
        <option value="AIDA4 證照（四天）">AIDA4 證照（四天）</option>
        <option value="訓練課程">訓練課程</option>
        <option value="導潛">導潛</option>
        <option value="線上平壓課">線上平壓課</option>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label>課程日期<span class="req">*</span></label>
        <input type="date" id="courseDate" required>
      </div>
      <div class="field">
        <label>上課地點<span class="req">*</span></label>
        <input type="text" id="location" placeholder="例如：翡翠灣 / 店內教室" required>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>匯款金額<span class="req">*</span></label>
        <input type="number" id="amount" min="1" inputmode="numeric" required>
      </div>
      <div class="field">
        <label>匯款後五碼<span class="req">*</span></label>
        <input type="text" id="last5" maxlength="5" pattern="\d{5}" inputmode="numeric" placeholder="12345" required>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>緊急聯絡人姓名<span class="req">*</span></label>
        <input type="text" id="ecName" required>
      </div>
      <div class="field">
        <label>與緊急聯絡人關係<span class="req">*</span></label>
        <input type="text" id="ecRelation" placeholder="例如：父親 / 配偶" required>
      </div>
    </div>

    <div class="field">
      <label style="margin-bottom:8px;">醫療聲明<span class="req">*</span></label>
      <div
